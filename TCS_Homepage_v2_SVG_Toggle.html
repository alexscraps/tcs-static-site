<script>
var themes = ['light', 'dark', 'retro'];
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  var idx = themes.indexOf(current);
  var next = themes[(idx + 1) % themes.length];
  html.setAttribute('data-theme', next);
}

// Dots scroll: left → right, completes by next section
(function() {
  const wrapper = document.getElementById('scroll-dots');
  if (!wrapper) return;
  const svg = wrapper.querySelector('.dots-svg');
  const container = wrapper.querySelector('.container');

  let ticking = false;

  function updateDots() {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const progress = Math.min(Math.max(scrollTop / docHeight, 0), 1);

    const containerWidth = container.offsetWidth;
    const maxTravel = containerWidth * 0.7; // longer sweep
    const startOffset = containerWidth * 0.2; // start near left edge
    const x = startOffset + (progress * maxTravel);

    svg.style.transform = 'translateX(' + x + 'px)';
    ticking = false;
  }

  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(updateDots);
      ticking = true;
    }
  }, { passive: true });

  window.addEventListener('resize', updateDots);
  updateDots();
})();

// Brand palette pop - smooth Apple-style
(function() {
  function applyPop(el) {
    if (el.classList.contains('pop')) return;
